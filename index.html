<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Practice</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem;
    }
    h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
    .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }
    .search-box {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
    }
    .search-box textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 1rem;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    .filters {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .filters select, .filters input {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      background: white;
    }
    .filters button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1.25rem;
      font-size: 0.95rem;
      cursor: pointer;
      margin-left: auto;
    }
    .filters button:hover { background: #1d4ed8; }
    .stats {
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .results { display: flex; flex-direction: column; gap: 1rem; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
      gap: 1rem;
    }
    .card-id { font-weight: 600; font-size: 0.95rem; }
    .card-meta { font-size: 0.8rem; color: #666; margin-top: 0.2rem; }
    .match-pct {
      background: #eff6ff;
      color: #2563eb;
      border-radius: 6px;
      padding: 0.25rem 0.6rem;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .card-summary { font-size: 0.95rem; margin-bottom: 0.75rem; color: #333; }
    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tag {
      background: #f3f4f6;
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      color: #444;
    }
    .tag.area { background: #ecfdf5; color: #065f46; }
    .tag.difficulty { background: #fff7ed; color: #92400e; }
    .expand-btn {
      margin-top: 0.75rem;
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 0.3rem 0.75rem;
      font-size: 0.85rem;
      cursor: pointer;
      color: #444;
    }
    .expand-btn:hover { background: #f9fafb; }
    .problem-detail {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #eee;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .problem-detail h4 { font-size: 0.8rem; color: #888; margin-bottom: 0.25rem; margin-top: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .loading { text-align: center; color: #888; padding: 2rem; }
    .error { color: #dc2626; padding: 1rem; background: #fef2f2; border-radius: 8px; }
    .empty { color: #888; text-align: center; padding: 2rem; }
  </style>
<script>MathJax = {tex: {inlineMath: [["$","$"],["\\(","\\)"]]}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>

<h1>Math Practice</h1>
<p class="subtitle">Search by topic, technique, or describe a problem type</p>

<div class="search-box">
  <textarea id="query" placeholder="Describe a problem type, e.g. 'find the remainder when a large power is divided by a prime'..."></textarea>
  <div class="filters">
    <select id="area">
      <option value="">All areas</option>
      <option>Algebra</option>
      <option>Combinatorics</option>
      <option>Geometry</option>
      <option>Number Theory</option>
    </select>
    <select id="difficulty">
      <option value="">Any difficulty</option>
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>
    <input id="technique" placeholder="Technique, e.g. Vieta's formulas" style="width:220px">
    <input id="k" type="number" value="5" min="1" max="20" style="width:70px">
    <button onclick="search()">Search</button>
  </div>
</div>

<div id="stats" class="stats"></div>
<div id="results" class="results"></div>

<script>
  const API = "https://matchcontests-api.onrender.com";

  async function loadStats() {
    try {
      const res = await fetch(`${API}/stats`);
      const data = await res.json();
      document.getElementById("stats").textContent =
        `${data.total} problems across ${Object.keys(data.by_contest).length} contests`;
    } catch(e) {}
  }

  async function search() {
    const query = document.getElementById("query").value.trim();
    const area = document.getElementById("area").value;
    const difficulty = document.getElementById("difficulty").value;
    const technique = document.getElementById("technique").value.trim();
    const k = document.getElementById("k").value;

    const params = new URLSearchParams();
    if (query) params.set("text", query);
    if (area) params.set("area", area);
    if (difficulty) params.set("difficulty", difficulty);
    if (technique) params.set("technique", technique);
    params.set("k", k);

    document.getElementById("results").innerHTML = '<div class="loading">Searching...</div>';

    try {
      const res = await fetch(`${API}/practice?${params}`);
      const data = await res.json();
      renderResults(data.results || []);
    } catch(e) {
      document.getElementById("results").innerHTML =
        `<div class="error">Could not reach the API. Is the backend running?</div>`;
    }
  }

  function renderResults(results) {
    const el = document.getElementById("results");
    if (!results.length) {
      el.innerHTML = '<div class="empty">No problems found.</div>';
      return;
    }
    el.innerHTML = results.map((r, i) => `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-id">${r.id}</div>
            <div class="card-meta">${(r.sources || [r.contest]).join(" / ")} &middot; L${r.difficulty_score}</div>
          </div>
          ${r.match_pct !== undefined ? `<div class="match-pct">${r.match_pct}% match</div>` : ""}
        </div>
        <div class="card-summary">${r.summary || ""}</div>
        <div class="tags">
          ${(r.area || []).map(a => `<span class="tag area">${a}</span>`).join("")}
          ${(r.techniques || []).map(t => `<span class="tag">${t}</span>`).join("")}
          ${r.difficulty ? `<span class="tag difficulty">${r.difficulty}</span>` : ""}
        </div>
        <button class="expand-btn" onclick="toggleDetail(${i})">Show problem</button>
        <div id="detail-${i}" class="problem-detail" style="display:none">
          <h4>Statement</h4>
          <p>${r.statement || "—"}</p>
          <h4>Answer</h4>
          <p>${r.answer || "—"}</p>
        </div>
      </div>
    `).join("");
  }

  function toggleDetail(i) {
    const el = document.getElementById(`detail-${i}`);
    const btn = el.previousElementSibling;
    const hidden = el.style.display === "none";
    el.style.display = hidden ? "block" : "none";
    btn.textContent = hidden ? "Hide problem" : "Show problem";
  }

  loadStats();
</script>
</body>
</html>
