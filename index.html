<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Practice</title>
  <script>MathJax = {tex: {inlineMath: [["$","$"],["\\(","\\)"]]}};</script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem;
      max-width: 860px;
      margin: 0 auto;
    }
    h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
    .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }
    .search-box {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
    }
    .search-box textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 1rem;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    .filters {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .filters select, .filters input {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      background: white;
    }
    .filters button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1.25rem;
      font-size: 0.95rem;
      cursor: pointer;
      margin-left: auto;
    }
    .filters button:hover { background: #1d4ed8; }
    .stats { color: #666; font-size: 0.85rem; margin-bottom: 1rem; }
    .results { display: flex; flex-direction: column; gap: 1rem; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
      gap: 1rem;
    }
    .card-id { font-weight: 600; font-size: 0.95rem; }
    .card-meta { font-size: 0.8rem; color: #666; margin-top: 0.2rem; }
    .match-pct {
      background: #eff6ff;
      color: #2563eb;
      border-radius: 6px;
      padding: 0.25rem 0.6rem;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
    .tag {
      background: #f3f4f6;
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      color: #444;
    }
    .tag.area { background: #ecfdf5; color: #065f46; }
    .tag.difficulty { background: #fff7ed; color: #92400e; }
    .loading { text-align: center; color: #888; padding: 2rem; }
    .error { color: #dc2626; padding: 1rem; background: #fef2f2; border-radius: 8px; }
    .empty { color: #888; text-align: center; padding: 2rem; }
  </style>
</head>
<body>

<h1>Math Practice</h1>
<p class="subtitle">Find practice problems by topic, technique, or description</p>

<div class="search-box">
  <textarea id="query" placeholder="Describe what you want to practice, e.g. 'problems using modular arithmetic and Fermat's little theorem'..."></textarea>
  <div class="filters">
    <select id="area">
      <option value="">All areas</option>
      <option>Algebra</option>
      <option>Combinatorics</option>
      <option>Geometry</option>
      <option>Number Theory</option>
    </select>
    <select id="difficulty">
      <option value="">Any difficulty</option>
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>
    <input id="technique" placeholder="Technique, e.g. inclusion-exclusion" style="width:220px">
    <input id="k" type="number" value="5" min="1" max="20" style="width:70px">
    <button onclick="search()">Search</button>
  </div>
</div>

<div id="stats" class="stats"></div>
<div id="results" class="results"></div>

<script>
  const API = "https://matchcontests-api.onrender.com";

  async function loadStats() {
    try {
      const res = await fetch(`${API}/stats`);
      const data = await res.json();
      document.getElementById("stats").textContent =
        `${data.total} problems — ${Object.entries(data.by_area).map(([k,v]) => `${v} ${k}`).join(", ")}`;
    } catch(e) {}
  }

  async function search() {
    const query = document.getElementById("query").value.trim();
    const area = document.getElementById("area").value;
    const difficulty = document.getElementById("difficulty").value;
    const technique = document.getElementById("technique").value.trim();
    const k = document.getElementById("k").value;

    const params = new URLSearchParams();
    if (query) params.set("text", query);
    if (area) params.set("area", area);
    if (difficulty) params.set("difficulty", difficulty);
    if (technique) params.set("technique", technique);
    params.set("k", k);

    document.getElementById("results").innerHTML = '<div class="loading">Searching...</div>';

    try {
      const res = await fetch(`${API}/practice?${params}`);
      const data = await res.json();
      renderResults(data.results || []);
    } catch(e) {
      document.getElementById("results").innerHTML =
        `<div class="error">Could not reach the API. It may be waking up — try again in 30 seconds.</div>`;
    }
  }

  function renderResults(results) {
    const el = document.getElementById("results");
    if (!results.length) {
      el.innerHTML = '<div class="empty">No problems found.</div>';
      return;
    }
    el.innerHTML = results.map(r => `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-id">${r.id}</div>
            <div class="card-meta">${(r.sources || [r.contest]).join(" / ")} &middot; Difficulty ${r.difficulty_score}/10</div>
          </div>
          ${r.match_pct !== undefined ? `<div class="match-pct">${r.match_pct}% match</div>` : ""}
        </div>
        <div class="tags">
          ${(r.area || []).map(a => `<span class="tag area">${a}</span>`).join("")}
          ${(r.techniques || []).map(t => `<span class="tag">${t}</span>`).join("")}
          ${r.difficulty ? `<span class="tag difficulty">${r.difficulty}</span>` : ""}
        </div>
      </div>
    `).join("");
    if (window.MathJax) MathJax.typesetPromise();
  }

  loadStats();
</script>
</body>
</html>
